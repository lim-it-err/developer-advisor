spring:
  application:
    name: advisor
  profiles:
    active: mock
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  datasource:
    url: jdbc:h2:mem:advisor;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

advisor:
  cors:
    allowed-origin: http://localhost:5173
  llm:
    roles:
      generate: { provider: mock, model: default }
      review: { provider: mock, model: default }
      chat: { provider: mock, model: default }
